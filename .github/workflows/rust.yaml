name: Rust CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show active-toolchain
      - run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-features --all-targets -- -D clippy::all

  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked --workspace --all-features

  test:
    name: Test Suite
    needs: [lint, check]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install ${{ matrix.toolchain }} --profile minimal

      - name: Set default toolchain
        run: rustup default ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked --workspace --all-features

      - name: Test
        run: cargo test --locked --workspace --all-features --all-targets

  audit:
    name: Security Audit
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - uses: Swatinem/rust-cache@v2
      - run: cargo audit

  docs:
    name: Build Docs
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --workspace --all-features

  udeps:
    name: Unused Dependencies
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-udeps
        run: cargo install cargo-udeps
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly udeps --all-targets

  miri:
    name: Miri (UB checks)
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly + miri
        run: |
          rustup toolchain install nightly
          rustup +nightly component add miri
          rustup override set nightly
      - run: cargo miri setup
      - run: cargo miri test

  coverage:
    name: Code Coverage
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - uses: Swatinem/rust-cache@v2

      - name: Generate coverage report
        run: cargo tarpaulin --workspace --all-features --out Xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          fail_ci_if_error: true

  bench:
    name: Benchmarks
    if: github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install nightly
      - run: rustup default nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench